<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TommyFinance Pro - Dashboard Finanzas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="glow-bg"></div> <header class="glass-header">
        <div class="logo-container">
            <h1 class="gradient-text"><i class="fa-solid :fa-bolt"></i> TommyFinance</h1>
            <span class="badge-status">● Live Cloud</span>
        </div>
    </header>

    <main class="container">
        <section class="balance-cards">
            <div class="card-glass balance-main">
                <h4>BALANCE TOTAL DISPONIBLE</h4>
                <h2 id="txt-balance-neto">S/ 0.00</h2>
            </div>
        </section>

        <section class="bancos-grid">
            <div class="sub-card-glass yape-theme">
                <p><i class="fa-solid :fa-mobile-screen-button"></i> Yape / Plin</p>
                <h3 id="saldo-yape">S/ 0.00</h3>
            </div>
            <div class="sub-card-glass banco-theme">
                <p><i class="fa-solid :fa-credit-card"></i> Cuentas Bancos</p>
                <h3 id="saldo-banco">S/ 0.00</h3>
            </div>
            <div class="sub-card-glass efectivo-theme">
                <p><i class="fa-solid :fa-money-bill-wave"></i> Efectivo Real</p>
                <h3 id="saldo-efectivo">S/ 0.00</h3>
            </div>
        </section>

        <nav class="nav-pills">
            <button class="pill-btn active" onclick="cambiarPestaña('registrar')"><i class="fa-solid :fa-circle-plus"></i> Registrar</button>
            <button class="pill-btn" onclick="cambiarPestaña('cuentas')"><i class="fa-solid :fa-chart-pie"></i> Reportes</button>
            <button class="pill-btn" onclick="cambiarPestaña('deudas')"><i class="fa-solid :fa-building-columns"></i> Bancos</button>
        </nav>

        <div id="pestaña-registrar" class="tab-content">
            <div id="alerta-automatica-cuota" class="glass-alert animate-flicker" style="display: none;"></div>

            <div class="card-glass form-glass">
                <h3><i class="fa-solid :fa-pen-to-square"></i> Nueva Operación</h3>
                <form id="form-operacion" onsubmit="registrarOperacion(event)">
                    <div class="input-box">
                        <label>Monto Exacto (S/)</label>
                        <input type="number" step="0.01" id="op-monto" placeholder="0.00" required>
                    </div>

                    <div class="input-box">
                        <label>Tipo de Operación</label>
                        <select id="op-tipo" onchange="actualizarCategorias()" required>
                            <option value="ingreso">🟢 Ingreso mensual (Mi Trabajo / Entradas)</option>
                            <option value="gasto" selected>🔴 Gasto / Deuda (Salidas)</option>
                        </select>
                    </div>

                    <div class="input-box">
                        <label>Categoría</label>
                        <select id="op-categoria" required></select>
                    </div>

                    <div class="input-box">
                        <label>Origen / Destino del flujo</label>
                        <select id="op-metodo" required>
                            <option value="Yape/Plin">📱 Yape / Plin</option>
                            <option value="Tarjeta de Débito">💳 Cuenta de Banco (BCP/Interbank)</option>
                            <option value="Efectivo">💵 Efectivo Físico</option>
                        </select>
                    </div>

                    <div class="input-box">
                        <label>Detalle / Concepto</label>
                        <input type="text" id="op-concepto" placeholder="Ej. Pago de mensualidad, freelance..." required>
                    </div>

                    <button type="submit" class="btn-gradient action-blue">Registrar Movimiento</button>
                </form>
            </div>

            <div class="card-glass form-glass" style="margin-top: 20px;">
                <h3><i class="fa-solid :fa-bullseye"></i> Límites de Presupuesto</h3>
                <form id="form-limite" onsubmit="establecerLimite(event)">
                    <div class="input-box">
                        <label>Categoría</label>
                        <select id="limite-categoria" required>
                            <option value="Alimentación">🍔 Alimentación</option>
                            <option value="Servicios">💡 Servicios</option>
                            <option value="Entretenimiento">🎬 Entretenimiento</option>
                            <option value="Trabajo">💼 Trabajo</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <label>Tope Máximo Mensual (S/)</label>
                        <input type="number" step="0.01" id="limite-monto" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="btn-dark-glow">Establecer Límite</button>
                </form>
                <div id="lista-limites" class="limites-wrapper"></div>
            </div>
        </div>

        <div id="pestaña-cuentas" class="tab-content" style="display: none;">
            <div class="card-glass">
                <h3><i class="fa-solid :fa-chart-simple"></i> Distribución Proporcional</h3>
                <div id="distribucion-barras" class="barras-wrapper"></div>
            </div>

            <div class="card-glass" style="margin-top: 20px;">
                <h3><i class="fa-solid :fa-clock-rotate-left"></i> Historial Cronológico</h3>
                <div class="filter-pills">
                    <button class="filter-pill active" onclick="filtrarMovimientos('todos', this)">Todos</button>
                    <button class="filter-pill" onclick="filtrarMovimientos('ingreso', this)">Ingresos</button>
                    <button class="filter-pill" onclick="filtrarMovimientos('gasto', this)">Gastos</button>
                </div>
                <div id="historial-lista" class="scroll-lista"></div>
            </div>

            <div class="respaldo-grid">
                <button onclick="exportarDatos()" class="btn-outline"><i class="fa-solid :fa-download"></i> Copia .JSON</button>
                <button onclick="document.getElementById('input-importar').click()" class="btn-outline"><i class="fa-solid :fa-upload"></i> Cargar</button>
                <input type="file" id="input-importar" style="display: none;" onchange="importarDatos(event)">
            </div>
        </div>

        <div id="pestaña-deudas" class="tab-content" style="display: none;">
            <div class="deudas-layout">
                <div class="card-glass">
                    <h3><i class="fa-solid :fa-landmark-flag"></i> Vincular Préstamo</h3>
                    <form id="form-nuevo-prestamo" onsubmit="crearPrestamo(event)">
                        <div class="input-box">
                            <label>Nombre de la Entidad Bancaria</label>
                            <input type="text" id="deuda-nombre" placeholder="Ej. Interbank, BCP..." required>
                        </div>
                        <div class="input-box">
                            <label>Monto Total Otorgado (S/)</label>
                            <input type="number" step="0.01" id="deuda-total" placeholder="0.00" required>
                        </div>
                        <div class="input-box">
                            <label>Cuota Fija Mensual (S/)</label>
                            <input type="number" step="0.01" id="deuda-cuota" placeholder="0.00" required>
                        </div>
                        <div class="input-box">
                            <label>Plazo Total (Meses / Cuotas)</label>
                            <input type="number" id="deuda-cuotas-totales" placeholder="Ej. 12" min="1" required>
                        </div>
                        <div class="input-box">
                            <label>Cuotas ya amortizadas hasta hoy</label>
                            <input type="number" id="deuda-cuotas-ya-pagadas" value="0" min="0">
                        </div>
                        <button type="submit" class="btn-gradient action-red">Vincular Crédito</button>
                    </form>
                </div>

                <div class="card-glass" style="margin-top: 20px;">
                    <h3><i class="fa-solid :fa-hand-holding-dollar"></i> Abono Manual</h3>
                    <form id="form-abonar-prestamo" onsubmit="abonarPrestamo(event)">
                        <div class="input-box">
                            <label>Seleccionar Préstamo Activo</label>
                            <select id="select-deuda-activa" required></select>
                        </div>
                        <div class="input-box">
                            <label>Monto de la Cuota a Amortizar (S/)</label>
                            <input type="number" step="0.01" id="abono-monto" placeholder="0.00" required>
                        </div>
                        <div class="input-box">
                            <label>Cuenta de Salida</label>
                            <select id="abono-metodo" required>
                                <option value="Yape/Plin">📱 Yape / Plin</option>
                                <option value="Tarjeta de Débito">💳 Cuenta de Banco</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-gradient action-yellow">Ejecutar Pago</button>
                    </form>
                </div>
            </div>

            <div class="card-glass" style="margin-top: 20px;">
                <h3><i class="fa-solid :fa-list-check"></i> Monitor de Créditos Activos</h3>
                <div id="lista-prestamos-progreso"></div>
            </div>
        </div>
    </main>

    <script src="js/finanzas.js"></script>
</body>
</html>
